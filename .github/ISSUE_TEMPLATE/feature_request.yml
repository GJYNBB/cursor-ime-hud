name: 功能建议
description: 为 Cursor IME HUD 提议改进
title: "[功能建议]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。Cursor IME HUD 有意只显示输入法状态：不会读取实际输入文本、检查文件内容、读取剪贴板或自动切换输入法。
  - type: textarea
    id: problem
    attributes:
      label: 问题或使用场景
      description: 这个建议要解决什么工作流问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议的行为
      description: 请描述你希望用户看到的具体行为。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 你是否尝试过设置、状态栏回退提示、诊断命令或其他扩展？
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: 受影响的平台
      options:
        - Windows
        - macOS
        - Linux
        - Remote / WSL / SSH
        - 其他
    validations:
      required: true
  - type: input
    id: ime
    attributes:
      label: 涉及的输入法或语言
      placeholder: "例如：微软拼音 / 中文"
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: 范围检查
      description: 请确认该建议符合项目的隐私和行为边界。
      options:
        - label: 此建议不需要读取实际输入文本。
          required: true
        - label: 此建议不需要读取剪贴板内容。
          required: true
        - label: 此建议不需要读取编辑器文件内容。
          required: true
        - label: 此建议不需要自动切换用户的输入法。
          required: true
