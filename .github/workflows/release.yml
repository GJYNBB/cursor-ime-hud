name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Builds helpers on native/cross runners, assembles a universal fallback VSIX
# plus one VSIX per target, and attaches all VSIX files to a tagged release.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-helpers:
    name: Build helper (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            os: windows-latest
            allow-skip: "0"
          - target: win32-arm64
            os: windows-latest
            allow-skip: "1"
          - target: darwin-x64
            os: macos-latest
            allow-skip: "1"
          - target: darwin-arm64
            os: macos-latest
            allow-skip: "0"
          - target: linux-x64
            os: ubuntu-latest
            allow-skip: "0"
          - target: linux-arm64
            os: ubuntu-latest
            allow-skip: "1"
          - target: linux-armhf
            os: ubuntu-latest
            allow-skip: "1"
    env:
      CURSOR_IME_HELPER_TARGET: ${{ matrix.target }}
      CURSOR_IME_HELPER_ALLOW_SKIP: ${{ matrix.allow-skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        run: |
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Linux cross toolchain
        if: startsWith(matrix.target, 'linux-arm')
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          timeout 8m sudo apt-get update -o Acquire::Retries=3
          if [ "${{ matrix.target }}" = "linux-arm64" ]; then
            timeout 8m sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            timeout 8m sudo apt-get install -y gcc-arm-linux-gnueabihf
          fi

      - name: Cache Rust target directory
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: native/ime-watcher/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-target-${{ hashFiles('native/ime-watcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-target-

      - name: Install dependencies
        run: npm ci

      - name: Run helper unit tests
        run: npm run test:helper:unit

      - name: Build native helper
        run: npm run build:helper

      - name: Sign native helper when credentials are available
        if: startsWith(github.ref, 'refs/tags/') && (startsWith(matrix.target, 'win32-') || startsWith(matrix.target, 'darwin-'))
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
          WINDOWS_SIGNTOOL_PATH: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          MACOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.MACOS_SIGNING_CERTIFICATE_BASE64 }}
          MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: node scripts/sign-native-helper.js

      - name: Smoke test helper
        run: npm run test:helper

      - name: Stage helper artifact
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const { selectedHelper } = require('./scripts/helper-platforms');
          const helper = selectedHelper();
          if (!helper) process.exit(1);
          const files = [helper.resourcePath, helper.sha256Path];
          for (const file of files) {
            const target = path.join('helper-artifact', file.replace(/^resources\/bin\//, ''));
            fs.mkdirSync(path.dirname(target), { recursive: true });
            fs.copyFileSync(file, target);
          }
          NODE

      - name: Upload helper resources
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: helper-${{ matrix.target }}
          path: helper-artifact/**
          if-no-files-found: error
          retention-days: 7

  package:
    name: Package VSIX (ubuntu)
    runs-on: ubuntu-latest
    needs: build-helpers
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download helper resources
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: helper-*
          path: resources/bin
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore helper execute bits
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { allHelpers } = require('./scripts/helper-platforms');
          for (const helper of allHelpers().filter((entry) => entry.platform !== 'win32')) {
            fs.chmodSync(helper.resourcePath, 0o755);
          }
          NODE

      - name: Setup Rust toolchain
        run: |
          rustup default stable
          rustc --version
          cargo --version

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const expectedTag = `v${pkg.version}`;

          if (process.env.GITHUB_REF_NAME !== expectedTag) {
            throw new Error(`Tag '${process.env.GITHUB_REF_NAME}' does not match package.json version '${expectedTag}'.`);
          }

          if (lock.version !== pkg.version || lock.packages?.['']?.version !== pkg.version) {
            throw new Error(`package-lock.json version does not match package.json version '${pkg.version}'.`);
          }
          NODE

      - name: Verify assembled helper resources
        env:
          CURSOR_IME_VERIFY_ALL_HELPERS: "1"
        run: npm run verify:helper-resources

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Pre-flight (publisher and compile)
        env:
          CURSOR_IME_VERIFY_ALL_HELPERS: "1"
        run: npm run vscode:prepublish

      - name: Package platform-specific VSIX files
        run: npm run package:vsix:targets -- --out-dir dist/vsix

      - name: Package universal fallback VSIX
        run: npm run package:vsix

      - name: Verify VSIX filenames and contents
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const { spawnSync } = require('node:child_process');
          const { allHelpers } = require('./scripts/helper-platforms');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const universal = `${pkg.name}-${pkg.version}.vsix`;
          if (!fs.existsSync(universal)) throw new Error(`Expected universal VSIX '${universal}' was not produced.`);
          for (const helper of allHelpers()) {
            const file = path.join('dist', 'vsix', `cursor-ime-hud-${pkg.version}-${helper.targetKey}.vsix`);
            if (!fs.existsSync(file)) throw new Error(`Expected VSIX '${file}' was not produced.`);
            const result = spawnSync(process.execPath, ['scripts/verify-vsix.js', '--target', helper.targetKey, file], { stdio: 'inherit' });
            if (result.status !== 0) process.exit(result.status ?? 1);
          }
          NODE

          universal="$(node -p "require('./package.json').name + '-' + require('./package.json').version + '.vsix'")"
          listing="$(unzip -Z1 "$universal")"
          node <<'NODE' > /tmp/cursor-ime-hud-universal-vsix-entries.txt
          const { allHelpers } = require('./scripts/helper-platforms');
          for (const helper of allHelpers()) {
            console.log(`extension/${helper.resourcePath}`);
            console.log(`extension/${helper.sha256Path}`);
          }
          console.log('extension/resources/helper-manifest.json');
          NODE
          while IFS= read -r entry; do
            if ! grep -qx "$entry" <<<"$listing"; then
              echo "Universal VSIX is missing $entry" >&2
              exit 1
            fi
          done < /tmp/cursor-ime-hud-universal-vsix-entries.txt

      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          node scripts/generate-sbom.js \
            --output "dist/sbom/cursor-ime-hud-${version}-vsix.cdx.json" \
            --artifact-glob "cursor-ime-hud-${version}.vsix" \
            --artifact-glob "dist/vsix/*.vsix"

      - name: Upload VSIX artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cursor-ime-hud-${{ github.ref_name }}-vsix
          path: |
            cursor-ime-hud-*.vsix
            dist/vsix/*.vsix
            dist/sbom/*.cdx.json
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish VSIX release assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
      actions: read
      id-token: write
      attestations: write
    steps:
      - name: Download packaged VSIX artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: cursor-ime-hud-${{ github.ref_name }}-vsix
          path: publish-artifacts

      - name: Flatten release subjects
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p publish-subjects
          find publish-artifacts -type f \( -name '*.vsix' -o -name '*.cdx.json' \) -exec cp {} publish-subjects/ \;
          vsix_count=$(find publish-subjects -maxdepth 1 -name '*.vsix' -type f | wc -l)
          sbom_count=$(find publish-subjects -maxdepth 1 -name '*.cdx.json' -type f | wc -l)
          if [ "$vsix_count" -ne 8 ] || [ "$sbom_count" -ne 1 ]; then
            echo "Expected one universal VSIX, seven target VSIX files, and one SBOM; found ${vsix_count} VSIX and ${sbom_count} SBOM files." >&2
            find publish-artifacts -type f -print >&2
            exit 1
          fi

      - name: Attest VSIX build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: publish-subjects/*

      - name: Attach VSIX files to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes || gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null
          fi
          gh release upload "$tag" publish-subjects/* --clobber --repo "$GITHUB_REPOSITORY"
