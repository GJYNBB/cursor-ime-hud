name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Allow only one concurrent release job. The workflow builds and packages the
# Windows helper on a Windows runner, keeps the Actions artifact for debugging,
# and attaches the VSIX to the GitHub Release when it is triggered by a tag.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  package:
    name: Package VSIX (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        run: |
          rustup default stable
          rustc --version
          cargo --version

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: native/WinImeWatcher/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('native/WinImeWatcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Pre-flight (publisher, compile, helper build)
        # Refuse to package when the publisher field is still the upstream
        # placeholder. `vscode:prepublish` also compiles TypeScript and builds
        # the Rust helper plus its .sha256 sidecar.
        run: npm run vscode:prepublish

      - name: Verify helper smoke test
        run: npm run test:helper

      - name: Package .vsix
        run: npm run package:vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor-ime-hud-${{ github.ref_name }}
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 30

      - name: Attach .vsix to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Cursor IME HUD $tag"
          fi
          gh release upload "$tag" ./*.vsix --clobber
