name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent run per workflow+branch+ref so we do not
# double-charge CI minutes on rapid pushes. Self-cancels superseded runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  test-extension:
    name: Test extension (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run extension unit tests
        # Ubuntu runners can drive the VS Code Extension Host headlessly,
        # so we can run the full unit suite without Windows.
        run: xvfb-run --auto-servernum npm run test:extension

  coverage:
    name: Coverage (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Generate coverage
        run: xvfb-run --auto-servernum npm run coverage

      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

  test-helper:
    name: Test helper (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            os: windows-latest
            allow-skip: "0"
          - target: win32-arm64
            os: windows-latest
            allow-skip: "1"
          - target: darwin-x64
            os: macos-latest
            allow-skip: "1"
          - target: darwin-arm64
            os: macos-latest
            allow-skip: "0"
          - target: linux-x64
            os: ubuntu-latest
            allow-skip: "0"
          - target: linux-arm64
            os: ubuntu-latest
            allow-skip: "1"
          - target: linux-armhf
            os: ubuntu-latest
            allow-skip: "1"
    env:
      CURSOR_IME_HELPER_TARGET: ${{ matrix.target }}
      CURSOR_IME_HELPER_ALLOW_SKIP: ${{ matrix.allow-skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        run: |
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Linux cross toolchain
        if: startsWith(matrix.target, 'linux-arm')
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          timeout 8m sudo apt-get update -o Acquire::Retries=3
          if [ "${{ matrix.target }}" = "linux-arm64" ]; then
            timeout 8m sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            timeout 8m sudo apt-get install -y gcc-arm-linux-gnueabihf
          fi

      - name: Cache Rust target directory
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: native/ime-watcher/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-target-${{ hashFiles('native/ime-watcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-target-

      - name: Install dependencies
        run: npm ci

      - name: Run helper unit tests
        run: npm run test:helper:unit

      - name: Build native helper
        run: npm run build:helper

      - name: Run helper integration test
        run: npm run test:helper

      - name: Package target-specific VSIX
        run: npm run package:vsix:target -- --target ${{ matrix.target }} --out-dir dist/vsix

      - name: Verify target-specific VSIX
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          node scripts/verify-vsix.js \
            --target "${{ matrix.target }}" \
            "dist/vsix/cursor-ime-hud-${version}-${{ matrix.target }}.vsix"
