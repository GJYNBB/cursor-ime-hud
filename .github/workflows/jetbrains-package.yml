name: JetBrains Plugin Package

on:
  push:
    branches:
      - main
      - jetbrains-plugin-windows
  workflow_dispatch:

concurrency:
  group: jetbrains-package-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    name: Package JetBrains plugin (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Rust toolchain
        shell: pwsh
        run: |
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          rustc --version
          cargo --version

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: native/WinImeWatcher/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('native/WinImeWatcher/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Test JetBrains plugin
        working-directory: jetbrains
        shell: pwsh
        run: .\gradlew.bat --no-daemon test

      - name: Build JetBrains plugin
        working-directory: jetbrains
        shell: pwsh
        run: .\gradlew.bat --no-daemon buildPlugin

      - name: Verify JetBrains plugin package
        working-directory: jetbrains
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path build/distributions -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            throw "JetBrains plugin ZIP was not produced."
          }

          $inspectDir = Join-Path $env:RUNNER_TEMP "cursor-ime-hud-jetbrains"
          if (Test-Path $inspectDir) {
            Remove-Item -Recurse -Force $inspectDir
          }
          New-Item -ItemType Directory -Force -Path $inspectDir | Out-Null
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $inspectDir -Force

          $jars = Get-ChildItem -Path $inspectDir -Recurse -Filter "*.jar"
          if (-not $jars) {
            throw "JetBrains plugin ZIP does not contain any plugin JARs."
          }

          $mainPluginJars = @()
          foreach ($jar in $jars) {
            Write-Host "Inspecting JAR: $($jar.FullName)"
            $entries = & jar tf $jar.FullName
            if ($entries -contains "META-INF/plugin.xml") {
              $mainPluginJars += [PSCustomObject]@{
                Jar = $jar
                Entries = $entries
              }
            }
          }

          if ($mainPluginJars.Count -ne 1) {
            throw "Expected exactly one main plugin JAR containing META-INF/plugin.xml, found $($mainPluginJars.Count)."
          }

          $mainPluginJar = $mainPluginJars[0]
          $mainEntries = New-Object System.Collections.Generic.HashSet[string]
          $mainPluginJar.Entries | ForEach-Object { [void]$mainEntries.Add($_) }

          $required = @(
            "META-INF/plugin.xml",
            "META-INF/pluginIcon.svg",
            "META-INF/pluginIcon_dark.svg",
            "bin/win-x64/WinImeWatcher.exe",
            "bin/win-x64/WinImeWatcher.exe.sha256"
          )

          foreach ($entry in $required) {
            if (-not $mainEntries.Contains($entry)) {
              throw "Main plugin JAR '$($mainPluginJar.Jar.FullName)' is missing required entry '$entry'."
            }
          }

          Write-Host "Verified main plugin JAR: $($mainPluginJar.Jar.FullName)"

          Write-Host "Verified JetBrains plugin artifact: $($zip.FullName)"

      - name: Upload JetBrains plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor-ime-hud-jetbrains-${{ github.ref_name }}
          path: jetbrains/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 30
